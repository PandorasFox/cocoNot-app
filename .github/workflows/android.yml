name: Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build web assets
        working-directory: app
        run: npm run build

      - name: Build camera plugin
        working-directory: app/plugins/camera
        run: npm run build

      - name: Build OCR plugin
        working-directory: app/plugins/ocr
        run: npm run build

      - name: Sync Capacitor
        working-directory: app
        run: npx cap sync android

      - name: Add camera permission
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />|' \
            app/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: app/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coconot.apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
